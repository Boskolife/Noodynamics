<div class="popup popup--reset-complete" id="reset-complete-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="reset-complete-popup-title" aria-describedby="reset-complete-popup-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
        </div>
        <div class="popup__inner">
            <h2 id="reset-complete-popup-title" class="popup__title">Password reset has been completed</h2>
            <p id="reset-complete-popup-desc" class="popup__text">Please log in with your new password.</p>
            <button type="button" class="popup__form-button btn btn--black js-return-to-login">Return to login</button>
        </div>
    </div>
</div>
