<div class="reader-panel" id="reader-search-panel-root" aria-hidden="true" hidden>
    <div class="reader-panel__window" role="dialog" aria-modal="true" aria-labelledby="reader-search-panel-title">
        <div class="reader__search-panel reader__panel" id="reader-search-panel">
            <div class="reader__search-inner">
                <input type="search" class="reader__search-input" id="reader-search-input" placeholder="Type here"
                    aria-label="Search in book" data-reader-panel-focus>
                <button type="button" class="reader__search-btn" id="reader-search-btn">SEARCH</button>
            </div>
            <ul class="reader__search-results" id="reader-search-results" role="listbox"></ul>
        </div>
    </div>
</div>
