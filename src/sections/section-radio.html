<section class="radio" id="radio">
    <div class="container">
        <h2 class="radio__title">
            Welcome to Noödynamics <br> Radio Chanel
        </h2>
        <div class="radio__inner">
            <div class="radio-player">
                <div class="radio-player__left">
                    <div class="radio-player__logo-wrapper">
                        <img src="/images/logo.png" alt="image not found" class="radio-player__logo">
                    </div>
                    <div class="radio-player__meta">
                        <div class="radio-player__name">Noödynamics Radio</div>
                        <div class="radio-player__subtitle">Live stream</div>
                    </div>
                </div>
                <div class="radio-player__center">
                    <div class="radio-player__controls">
                        <button class="radio-player__control" type="button" aria-label="Shuffle">
                            <img src="/icons/Icon-Shuffle.svg" alt="Shuffle" />
                        </button>
                        <button class="radio-player__control" type="button" aria-label="Previous">
                            <img src="/icons/Icon-Rewind-Filled.svg" alt="Previous" />
                        </button>
                        <button class="radio-player__control radio-player__control--play" type="button"
                            aria-label="Play">
                            <img src="/icons/Icon-Play-Filled.svg" alt="Play" />
                        </button>
                        <button class="radio-player__control" type="button" aria-label="Next">
                            <img src="/icons/Icon-Forward-Filled.svg" alt="Next" />
                        </button>
                        <button class="radio-player__control" type="button" aria-label="Repeat">
                            <img src="/icons/Icon-Repeat.svg" alt="Repeat" />
                        </button>
                    </div>
                    <div class="radio-player__progress">
                        <span class="radio-player__time">0:00</span>
                        <div class="radio-player__track">
                            <div class="radio-player__track-fill"></div>
                        </div>
                        <span class="radio-player__time">0:00</span>
                    </div>
                </div>
                <div class="radio-player__right">
                    <button class="radio-player__control" type="button" aria-label="Volume">
                        <img src="/icons/Icon-Volume.svg" alt="Volume" />
                    </button>
                </div>
            </div>
        </div>
        {{{picture "/images/radio-img.png" alt="Description" class="radio__img"}}}
    </div>
</section>
