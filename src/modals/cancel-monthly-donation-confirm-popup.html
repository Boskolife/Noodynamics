<div class="popup popup--cancel-monthly-donation-confirm" id="cancel-monthly-donation-confirm-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="cancel-monthly-donation-confirm-title" aria-describedby="cancel-monthly-donation-confirm-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
        </div>
        <div class="popup__inner">
            <h2 id="cancel-monthly-donation-confirm-title" class="popup__title">Cancel monthly donation?</h2>
            <p id="cancel-monthly-donation-confirm-desc" class="popup__text">Are you sure you want to cancel your monthly donation of <strong class="popup__text-highlight">$25.00</strong>? This will stop all future recurring donations.</p>
            <div class="popup__actions">
                <button type="button" class="popup__form-button btn btn--black js-keep-monthly-donation">Keep monthly donation</button>
                <button type="button" class="popup__form-button popup__form-button--outline btn js-cancel-monthly-donation-confirm">Cancel monthly donation</button>
            </div>
        </div>
    </div>
</div>
