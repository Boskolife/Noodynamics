<div class="popup popup--membership-canceled" id="membership-canceled-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="membership-canceled-title" aria-describedby="membership-canceled-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
        </div>
        <div class="popup__inner">
            <h2 id="membership-canceled-title" class="popup__title">Your membership has been canceled.</h2>
            <p id="membership-canceled-desc" class="popup__text">You're all set. Your membership stays active until March 24, 2026.</p>
            <p class="popup__text">No further charges will be made.</p>
            <button type="button" class="popup__form-button btn btn--black js-membership-canceled-done">Done</button>
        </div>
    </div>
</div>
