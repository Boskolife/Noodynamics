<div class="popup popup--auth" id="auth-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="auth-popup-title" aria-describedby="auth-popup-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
        </div>
        <div class="popup__inner">
            <h2 id="auth-popup-title" class="popup__title">Log In or create an account <br> to continue</h2>
            <p id="auth-popup-desc" class="popup__text">Log In or create an account to easily manage your membership in one place.</p>
            <form class="popup__form form-card" novalidate>
                <div class="form-card__group">
                    <label class="form-card__label" for="auth-name">name
                        <input class="form-card__input" type="text" id="auth-name" name="name" placeholder="Enter your name"
                            required>
                    </label>
                    <label class="form-card__label" for="auth-password">password
                        <input class="form-card__input" type="password" id="auth-password" name="password"
                            placeholder="enter your password" required>
                    </label>
                </div>
                <a href="#" class="popup__form-link">Forgot your password?</a>
                <button type="submit" class="popup__form-button btn btn--black">Log In</button>
            </form>
            <p class="popup__text popup__text-social">or log in with</p>
            <div class="popup__form-social">
                <a href="#" class="popup__form-social-link btn btn--black">
                    <img src="/icons/google.svg" alt="">
                    Google
                </a>
                <a href="#" class="popup__form-social-link btn btn--black">
                    <img src="/icons/apple.svg" alt="">
                    Apple
                </a>
            </div>
            <p class="popup__text popup__text-signup">don't have an account?
                <a href="#" class="popup__link">sign up</a>
            </p>
        </div>
    </div>
</div>
