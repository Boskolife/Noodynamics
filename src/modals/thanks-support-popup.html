<div class="popup popup--thanks-support" id="thanks-support-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="thanks-support-popup-title" aria-describedby="thanks-support-popup-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
            <h3 class="popup__title">Thank you for your support!</h3>
            <p class="popup__text">Your donation has been successfully received.
                We've created an account for you to help you track your donations and manage your membership.</p>
        </div>
        <div class="popup__inner">
            <h3 id="thanks-support-popup-title" class="popup__title">Create your password</h3>
            <p id="thanks-support-popup-desc" class="popup__text">Set a password to access your account.</p>
            <form class="popup__form form-card" novalidate>
                <div class="form-card__group">
                    <label class="form-card__label" for="thanks-password">create password
                        <input class="form-card__input" type="password" id="thanks-password" name="password" placeholder="create your password"
                            required>
                    </label>
                    <label class="form-card__label" for="thanks-password-confirm">confirm password
                        <input class="form-card__input" type="password" id="thanks-password-confirm" name="passwordConfirm"
                            placeholder="confirm your password" required>
                    </label>
                </div>
                <button type="submit" class="popup__form-button btn btn--black">create password</button>
            </form>
        </div>
    </div>
</div>
