<div class="profile-popup profile-popup--account-change-password" id="account-change-password-popup-backdrop" aria-hidden="true">
    <div class="profile-popup__overlay" aria-hidden="true"></div>
    <div class="profile-popup__window" role="dialog" aria-modal="true" aria-labelledby="account-change-password-popup-title">
        <div class="profile-popup__header">
            <h2 id="account-change-password-popup-title" class="profile-popup__header-title">Change password</h2>
            <button type="button" class="profile-popup__close" aria-label="Close popup">
                <img src="/icons/cross.svg" alt="" width="24" height="24">
            </button>
        </div>
        <div class="profile-popup__inner">
            <form action="" class="profile-popup__form form-card js-account-change-password-form" novalidate>
                <div class="form-card__group">
                    <label class="form-card__label" for="account-change-password-current">Current password
                        <input class="form-card__input" type="password" id="account-change-password-current" name="currentPassword"
                            placeholder="Enter your current password" required minlength="8" autocomplete="current-password">
                        <span id="account-change-password-current-error" class="form-card__error" role="alert"></span>
                    </label>
                </div>
                <div class="form-card__group">
                    <label class="form-card__label" for="account-change-password-new">New password
                        <input class="form-card__input" type="password" id="account-change-password-new" name="newPassword"
                            placeholder="Enter your new password" required minlength="8" autocomplete="new-password">
                        <span id="account-change-password-new-error" class="form-card__error" role="alert"></span>
                    </label>
                </div>
                <button type="submit" class="profile-popup__button profile-popup__button--save btn btn--primary">Save changes</button>
            </form>
        </div>
    </div>
</div>
