<div class="popup popup--reader-save" id="reader-save-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="reader-save-popup-title"
        aria-describedby="reader-save-popup-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
            <button type="button" class="popup__close js-close-popup" aria-label="Close">
                <img src="/icons/cross.svg" alt="">
            </button>
        </div>
        <div class="popup__inner">
            <h2 id="reader-save-popup-title" class="popup__title">SAVE YOUR READING PROCESS</h2>
            <p id="reader-save-popup-desc" class="popup__text">Log In to track your reading activity, save bookmarks, highlights, and notes. Without an account, your progress and highlights won’t be saved.</p>
            <form class="popup__form form-card js-reader-save-form" novalidate>
                <div class="form-card__group">
                    <label class="form-card__label" for="reader-save-name">Name
                        <input class="form-card__input" type="text" id="reader-save-name" name="name"
                            placeholder="Enter your name" required>
                    </label>
                    <label class="form-card__label" for="reader-save-password">Password
                        <input class="form-card__input" type="password" id="reader-save-password" name="password"
                            placeholder="Enter your password" required>
                    </label>
                </div>
                <button type="submit" class="popup__form-button btn btn--black">Save &amp; Continue</button>
            </form>
            <p class="popup__text popup__text-social">or continue with</p>
            <div class="popup__form-social">
                <a href="#" class="popup__form-social-link btn btn--black">
                    <img src="/icons/google.svg" alt="">
                    Google
                </a>
                <a href="#" class="popup__form-social-link btn btn--black">
                    <img src="/icons/apple.svg" alt="">
                    Apple
                </a>
            </div>
        </div>
    </div>
</div>
