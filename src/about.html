<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noodynamics - About</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="stylesheet" href="/styles/main.scss">
</head>

<body>
  {{> header }}
  <main id="main">
    <div class="about__buttons">
      <button class="about__button active" data-tab="organization-administration">organization & administration</button>
      <button class="about__button" data-tab="code-of-ethics">code of ethics</button>
      <button class="about__button" data-tab="contacts">contacts</button>
    </div>
    <div class="about__panels">
      <div class="about__tab-panel active" id="organization-administration">
        {{> section-organization-chart }}
        {{> section-about-how }}
        {{> section-member }}
      </div>
      <div class="about__tab-panel" id="code-of-ethics">
        {{> section-code-of-ethics }}
        {{> section-member }}
      </div>
      <div class="about__tab-panel" id="contacts">
        {{> section-about-contacts }}
      </div>
    </div>
  </main>
  {{> footer }}
  <script type="module" src="/js/main.js"></script>
</body>

<div class="about__content">
  <div class="about__content-inner">
    <h1 class="about__content-title">About</h1>
  </div>
</div>

</html>
