<div class="popup popup--enter-new-password" id="enter-new-password-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="enter-new-password-popup-title" aria-describedby="enter-new-password-popup-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
        </div>
        <div class="popup__inner">
            <h2 id="enter-new-password-popup-title" class="popup__title">Enter new password</h2>
            <p id="enter-new-password-popup-desc" class="popup__text popup__text-hint">* The password must be at least 8 characters long and include at least one uppercase letter, one lowercase letter, and one number.</p>
            <form class="popup__form form-card js-enter-new-password-form" novalidate>
                <div class="form-card__group">
                    <label class="form-card__label" for="new-password">new password
                        <input class="form-card__input" type="password" id="new-password" name="newPassword" placeholder="Create your new password" required autocomplete="new-password">
                        <span id="new-password-error" class="popup__form-error" role="alert"></span>
                    </label>
                    <label class="form-card__label" for="confirm-new-password">confirm new password
                        <input class="form-card__input" type="password" id="confirm-new-password" name="confirmNewPassword" placeholder="Confirm your new password" required autocomplete="new-password">
                        <span id="confirm-new-password-error" class="popup__form-error" role="alert"></span>
                    </label>
                </div>
                <button type="submit" class="popup__form-button btn btn--black">Password reset</button>
            </form>
        </div>
    </div>
</div>
