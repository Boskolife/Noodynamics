# Deploy static site to GitHub Pages.
# main  -> https://<user>.github.io/<repo>/
# other -> https://<user>.github.io/<repo>/preview/<branch>/
name: Deploy static content to Pages

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy paths
        id: paths
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${{ github.ref_name }}"
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "safe_branch=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"

          if [ "$BRANCH" = "main" ]; then
            echo "vite_base=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            echo "destination_dir=." >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          else
            echo "vite_base=/${REPO_NAME}/preview/${SAFE_BRANCH}/" >> "$GITHUB_OUTPUT"
            echo "destination_dir=preview/${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/preview/${SAFE_BRANCH}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ steps.paths.outputs.vite_base }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.paths.outputs.destination_dir }}
          keep_files: true

      - name: Deployment summary
        run: |
          {
            echo "## GitHub Pages deployment"
            echo ""
            echo "- **Branch:** \`${{ steps.paths.outputs.branch }}\`"
            echo "- **URL:** ${{ steps.paths.outputs.site_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
