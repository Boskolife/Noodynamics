<div class="popup popup--verify-code" id="verify-code-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="verify-code-popup-title"
        aria-describedby="verify-code-popup-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
        </div>
        <div class="popup__inner">
            <h2 id="verify-code-popup-title" class="popup__title">Enter verification code</h2>
            <p id="verify-code-popup-desc" class="popup__text popup__text-email">A v erification code has been sent to
                <span class="js-verify-email">mail@sample.com</span>. <br> Please enter the verification code.</p>
            <form class="popup__form form-card js-verify-code-form" novalidate>
                <div class="form-card__group">
                    <label class="form-card__label" for="verify-code-input">verification code
                        <input class="form-card__input" type="text" id="verify-code-input" name="code"
                            placeholder="Please enter the 6-digit verification code" required inputmode="numeric"
                            pattern="[0-9]*" maxlength="6" autocomplete="one-time-code">
                        <span id="verify-code-error" class="popup__form-error" role="alert"></span>
                    </label>
                </div>
                <p class="popup__form-resend">
                    <button type="button" class="popup__form-link popup__form-resend-link js-resend-code">Resend
                        code</button>
                </p>
                <button type="submit" class="popup__form-button btn btn--black">Verify</button>
            </form>
        </div>
    </div>
</div>
