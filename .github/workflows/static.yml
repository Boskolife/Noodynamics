# Deploy static site to GitHub Pages (GitHub Actions source).
# main  -> https://<user>.github.io/<repo>/
# other -> https://<user>.github.io/<repo>/preview/<branch>/
#
# Combined site state is kept on the gh-pages branch between runs.
name: Deploy static content to Pages

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy paths
        id: paths
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${{ github.ref_name }}"
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "safe_branch=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"

          if [ "$BRANCH" = "main" ]; then
            echo "vite_base=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            echo "deploy_path=." >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          else
            echo "vite_base=/${REPO_NAME}/preview/${SAFE_BRANCH}/" >> "$GITHUB_OUTPUT"
            echo "deploy_path=preview/${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/preview/${SAFE_BRANCH}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ steps.paths.outputs.vite_base }}

      - name: Fetch existing combined site
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Merge build into combined site
        run: |
          mkdir -p site
          touch site/.nojekyll

          if [ "${{ steps.paths.outputs.deploy_path }}" = "." ]; then
            rsync -av --delete dist/ site/
          else
            mkdir -p "site/${{ steps.paths.outputs.deploy_path }}"
            rsync -av --delete dist/ "site/${{ steps.paths.outputs.deploy_path }}/"
          fi

          touch site/.nojekyll

      - name: Verify combined site for preview deploys
        if: steps.paths.outputs.deploy_path != '.'
        run: |
          if [ ! -f site/index.html ]; then
            echo "::error::Main site is missing from the combined Pages artifact."
            echo "Push to main (or run this workflow on main) once before preview branches can be published."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload combined site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Sync gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

      - name: Deployment summary
        run: |
          {
            echo "## GitHub Pages deployment"
            echo ""
            echo "- **Branch:** \`${{ steps.paths.outputs.branch }}\`"
            echo "- **URL:** ${{ steps.paths.outputs.site_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
