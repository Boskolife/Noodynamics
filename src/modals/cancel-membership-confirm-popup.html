<div class="popup popup--cancel-membership-confirm" id="cancel-membership-confirm-popup-backdrop" aria-hidden="true">
    <div class="popup__overlay" aria-hidden="true"></div>
    <div class="popup__window" role="dialog" aria-modal="true" aria-labelledby="cancel-membership-confirm-title" aria-describedby="cancel-membership-confirm-desc">
        <div class="popup__header">
            <img src="/images/logo-text.png" alt="Noodynamics" class="popup__logo">
        </div>
        <div class="popup__inner">
            <h2 id="cancel-membership-confirm-title" class="popup__title">Cancel membership?</h2>
            <p id="cancel-membership-confirm-desc" class="popup__text">Are you sure you want to cancel your membership? You'll lose access to all member benefits at the end of your current billing period.</p>
            <div class="popup__actions">
                <button type="button" class="popup__form-button btn btn--black js-keep-membership">Keep my membership</button>
                <button type="button" class="popup__form-button popup__form-button--outline btn js-cancel-membership-confirm">Cancel my membership</button>
            </div>
        </div>
    </div>
</div>
