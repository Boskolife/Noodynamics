<section class="radio" id="radio">
    <div class="container">
        <h2 class="radio__title wow animate__animated animate__fadeInDown" data-wow-delay="0.1s">
            Welcome to Noödynamics <br> Radio Chanel
        </h2>
        <div class="radio__inner wow animate__animated animate__fadeInUp" data-wow-delay="0.15s">
            <div class="radio-player">
                <div class="radio-player__left">
                    <div class="radio-player__logo-wrapper wow animate__animated animate__zoomIn" data-wow-delay="0.2s">
                        <img src="/images/logo.png" alt="image not found" class="radio-player__logo">
                    </div>
                    <div class="radio-player__meta">
                        <div class="radio-player__name wow animate__animated animate__fadeInUp" data-wow-delay="0.25s">Noödynamics Radio</div>
                        <div class="radio-player__subtitle wow animate__animated animate__fadeInUp" data-wow-delay="0.3s">Live stream</div>
                    </div>
                </div>
                <div class="radio-player__center wow animate__animated animate__fadeInUp" data-wow-delay="0.35s">
                    <div class="radio-player__controls">
                        <button class="radio-player__control wow animate__animated animate__fadeInUp" data-wow-delay="0.4s" type="button" aria-label="Shuffle">
                            <img src="/icons/Icon-Shuffle.svg" alt="Shuffle" />
                        </button>
                        <button class="radio-player__control wow animate__animated animate__fadeInUp" data-wow-delay="0.45s" type="button" aria-label="Previous">
                            <img src="/icons/Icon-Rewind-Filled.svg" alt="Previous" />
                        </button>
                        <button class="radio-player__control radio-player__control--play wow animate__animated animate__pulse" data-wow-delay="0.5s" type="button"
                            aria-label="Play">
                            <img src="/icons/Icon-Play-Filled.svg" alt="Play" />
                        </button>
                        <button class="radio-player__control wow animate__animated animate__fadeInUp" data-wow-delay="0.55s" type="button" aria-label="Next">
                            <img src="/icons/Icon-Forward-Filled.svg" alt="Next" />
                        </button>
                        <button class="radio-player__control wow animate__animated animate__fadeInUp" data-wow-delay="0.6s" type="button" aria-label="Repeat">
                            <img src="/icons/Icon-Repeat.svg" alt="Repeat" />
                        </button>
                    </div>
                    <div class="radio-player__progress wow animate__animated animate__fadeInUp" data-wow-delay="0.65s">
                        <span class="radio-player__time">0:00</span>
                        <div class="radio-player__track">
                            <div class="radio-player__track-fill"></div>
                        </div>
                        <span class="radio-player__time">0:00</span>
                    </div>
                </div>
                <div class="radio-player__right wow animate__animated animate__fadeInUp" data-wow-delay="0.7s">
                    <button class="radio-player__control" type="button" aria-label="Volume">
                        <img src="/icons/Icon-Volume.svg" alt="Volume" />
                    </button>
                </div>
            </div>
        </div>
        {{{picture "/images/radio-img.png" alt="Description" class="radio__img wow animate__animated animate__zoomIn" data-wow-delay="0.75s"}}}
    </div>
</section>
